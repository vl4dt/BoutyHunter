# ─── BoutyHunter Configuration ──────────────────────────────────────
# Scan settings for opportunity_finder.py

scan:
  default_focus_areas: ["api", "llm", "mobile"]   # Focus areas to scan by default
  web_search_enabled: true                         # Enable/disable web search mode
  max_web_results_per_query: 5                     # Max results per search query
  output_dir: "."                                  # Where to save JSON results

# ─── Platform API Credentials ────────────────────────────────────────
# Fill in your credentials below and set enabled: true for each platform.
# The tool works without any of these — it falls back to web search.

platforms:

  # Intigriti Researcher API (Bearer token)
  # Get a token at: https://app.intigriti.com/auth/dashboard?redirect=/settings/api-tokens
  intigriti:
    enabled: true
    api_url: "https://api.intigriti.com/external/researcher"
    token: "CFAB87A1120984CA99B472824F4B4B1C0403484E101D810B918D17762147E96D-1"

  # HackerOne Researcher API (Basic auth: username + API token)
  # Get a token at: https://hackerone.com/settings/api-tokens
  hackerone:
    enabled: true
    api_url: "https://api.hackerone.com/v1/"
    username: "vl4dt"       # Your HackerOne API username (not your display name)
    token: "p5heGEsATpJLZwt84cyWGV7g4F3X5wkCWfGjsrzXijg="

  # ─── Platforms without researcher-facing program listing APIs ──────
  # These are kept as comments for reference. They only have org-facing APIs
  # (for companies hiring hackers), so they're not useful for discovery.

  # Bugcrowd — no public /programs endpoint for researchers
  # bugcrowd:
  #   enabled: false
  #   api_url: "https://api.bugcrowd.com"
  #   token_key: ""
  #   token_secret: ""

  # YesWeHack — requires CSM approval, only org-facing API exists
  # yeswehack:
  #   enabled: false
  #   api_url: "https://apps.yeswehack.com"
  #   client_id: ""
  #   client_secret: ""
